name: Verra VCM CSV Downloader

on:
  # Run automatically every Monday at 9:00 AM UTC
  schedule:
    - cron: "0 9 * * 1"

  # Also allow manual runs from the GitHub Actions tab
  workflow_dispatch:

jobs:
  download-csv:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install playwright playwright-stealth==1.0.6
          playwright install chromium
          playwright install-deps chromium

      - name: Run Verra scraper
        run: python scraper.py

      - name: Upload CSV as artifact
        uses: actions/upload-artifact@v4
        with:
          name: verra-allprojects-${{ github.run_number }}
          path: verra_allprojects.csv
          retention-days: 30

      - name: Show file info
        run: |
          echo "File size: $(du -sh verra_allprojects.csv)"
          echo "Row count: $(wc -l < verra_allprojects.csv)"
          echo "First 3 lines:"
          head -3 verra_allprojects.csv
